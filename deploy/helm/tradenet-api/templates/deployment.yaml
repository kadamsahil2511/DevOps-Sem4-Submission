apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradenet-api
  namespace: tradenet-apps
  labels:
    app.kubernetes.io/name: declaration-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: declaration-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: declaration-service
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
