name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: tradenet-demo
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  EC2_INSTANCE_ID: i-0715e18824145339e
  EC2_HOST: 13.201.205.69
  EC2_AVAILABILITY_ZONE: ap-south-1a
  EC2_SECURITY_GROUP_ID: sg-018b39741e4818441
  EC2_USER: ec2-user
  APP_DIR: /opt/tradenet
  AWS_ROLE_ARN: arn:aws:iam::116981787180:role/TradeNetGitHubActionsDeployRole

jobs:
  deploy:
    name: Build and deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare runtime bundle
        run: |
          rm -rf deploy-runtime deploy-artifacts
          mkdir -p deploy-runtime/services/api deploy-artifacts
          cp package.json package-lock.json prisma.config.ts deploy-runtime/
          cp services/api/package.json deploy-runtime/services/api/package.json
          cp -R services/api/prisma deploy-runtime/services/api/prisma
          cp -R dist deploy-runtime/dist
          cp -R services/api/dist deploy-runtime/services/api/dist
          tar --no-xattrs -czf deploy-artifacts/tradenet-runtime.tar.gz -C deploy-runtime .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: tradenet-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Open temporary SSH ingress
        id: ssh-ingress
        run: |
          runner_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')"
          echo "runner_ip=$runner_ip" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${runner_ip}/32,Description=\"GitHub Actions EC2 Instance Connect\"}]" || true

      - name: Generate ephemeral SSH key
        run: |
          ssh-keygen -t ed25519 -f /tmp/tradenet_eic -N "" -C github-actions-tradenet

      - name: Send EC2 Instance Connect key
        run: |
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$EC2_INSTANCE_ID" \
            --availability-zone "$EC2_AVAILABILITY_ZONE" \
            --instance-os-user "$EC2_USER" \
            --ssh-public-key file:///tmp/tradenet_eic.pub

      - name: Copy bundle to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i /tmp/tradenet_eic \
            deploy-artifacts/tradenet-runtime.tar.gz \
            "$EC2_USER@$EC2_HOST:/tmp/tradenet-runtime.tar.gz"

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/tradenet_eic "$EC2_USER@$EC2_HOST" <<'SSH'
          set -euo pipefail
          sudo systemctl stop tradenet-api || true
          sudo rm -rf /opt/tradenet.release
          sudo mkdir -p /opt/tradenet.release
          sudo tar -xzf /tmp/tradenet-runtime.tar.gz -C /opt/tradenet.release
          sudo chown -R ec2-user:ec2-user /opt/tradenet.release
          sudo rm -rf /opt/tradenet.data.keep
          if [ -d /opt/tradenet/data ]; then
            sudo mv /opt/tradenet/data /opt/tradenet.data.keep
          fi
          sudo rm -rf /opt/tradenet.previous
          if [ -d /opt/tradenet ]; then
            sudo mv /opt/tradenet /opt/tradenet.previous
          fi
          sudo mv /opt/tradenet.release /opt/tradenet
          if [ -d /opt/tradenet.data.keep ]; then
            sudo mv /opt/tradenet.data.keep /opt/tradenet/data
          fi
          sudo mkdir -p /opt/tradenet/data /etc/tradenet
          sudo chown -R ec2-user:ec2-user /opt/tradenet/data
          sudo tee /etc/tradenet/tradenet.env >/dev/null <<'ENV'
          NODE_ENV=production
          PORT=8080
          STATIC_DIR=/opt/tradenet/dist
          DATABASE_URL=file:/opt/tradenet/data/tradenet.db
          ENV
          sudo tee /etc/systemd/system/tradenet-api.service >/dev/null <<'SERVICE'
          [Unit]
          Description=TradeNet API
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/tradenet
          EnvironmentFile=/etc/tradenet/tradenet.env
          ExecStart=/usr/bin/node /opt/tradenet/services/api/dist/index.js
          Restart=always
          RestartSec=5
          User=ec2-user

          [Install]
          WantedBy=multi-user.target
          SERVICE
          sudo systemctl daemon-reload
          cd /opt/tradenet
          if ! node -e "const [major]=process.versions.node.split('.').map(Number); process.exit(major >= 20 ? 0 : 1)"; then
            curl -fsSL https://rpm.nodesource.com/setup_26.x | sudo bash -
            sudo dnf remove -y nodejs nodejs-npm || true
            sudo dnf install -y nodejs --allowerasing --best
          fi
          node --version
          npm --version
          npm ci --omit=dev --workspace @tradenet/api
          DATABASE_URL=file:/opt/tradenet/data/tradenet.db npm run db:generate
          DATABASE_URL=file:/opt/tradenet/data/tradenet.db npm run db:migrate
          DATABASE_URL=file:/opt/tradenet/data/tradenet.db npm run seed
          sudo systemctl enable tradenet-api
          sudo systemctl start tradenet-api
          sudo nginx -t
          sudo systemctl reload nginx
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health && curl -fsS http://127.0.0.1:8080/api/ready; then
              exit 0
            fi
            sleep 2
          done
          sudo systemctl status tradenet-api --no-pager
          exit 1
          SSH

      - name: Close temporary SSH ingress
        if: always()
        run: |
          runner_ip="${{ steps.ssh-ingress.outputs.runner_ip }}"
          if [ -z "$runner_ip" ]; then
            exit 0
          fi
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${runner_ip}/32,Description=\"GitHub Actions EC2 Instance Connect\"}]" || true

      - name: Verify production URL
        run: |
          curl -fL https://telnet.superuserz.com/
          curl -f https://telnet.superuserz.com/api/health
